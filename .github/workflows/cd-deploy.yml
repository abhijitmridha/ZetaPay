name: CD - Deploy

# Continuous deployment to Vercel.
#
# Triggers:
#   1. Automatically after the "CI" workflow succeeds on main -> deploys to
#      the "development" GitHub Environment. This is the only fully
#      automatic path; staging and production are always explicit,
#      human-initiated promotions.
#   2. workflow_dispatch -> deploy any ref to any environment. Production
#      deploys are gated by the "production" GitHub Environment's required
#      reviewers (configured in repo Settings > Environments), so the run
#      pauses for approval before touching anything.
#
# App runtime configuration (Supabase, database, Stellar network, contract
# IDs) lives in the Vercel project's own per-environment env vars, pulled by
# `vercel pull` at deploy time - see scripts/deploy/deploy.sh. GitHub only
# needs to store the Vercel API credentials themselves.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        options: [development, staging, production]
        default: development
        required: true
      ref:
        description: Git ref to deploy (branch, tag, or SHA)
        default: main
        required: true

permissions:
  contents: read
  deployments: write

jobs:
  context:
    name: Resolve deployment context
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    outputs:
      environment: ${{ steps.resolve.outputs.environment }}
      ref: ${{ steps.resolve.outputs.ref }}
      deploy_enabled: ${{ steps.vercel-preflight.outputs.deploy_enabled }}
    steps:
      - id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_ENVIRONMENT: ${{ inputs.environment }}
          INPUT_REF: ${{ inputs.ref }}
          WORKFLOW_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "environment=$INPUT_ENVIRONMENT" >> "$GITHUB_OUTPUT"
            echo "ref=$INPUT_REF" >> "$GITHUB_OUTPUT"
          else
            echo "environment=development" >> "$GITHUB_OUTPUT"
            echo "ref=$WORKFLOW_HEAD_SHA" >> "$GITHUB_OUTPUT"
          fi

      - name: Enforce branch/tag policy per environment
        env:
          DEPLOY_ENVIRONMENT: ${{ steps.resolve.outputs.environment }}
          DEPLOY_REF: ${{ steps.resolve.outputs.ref }}
        run: |
          set -euo pipefail
          env="$DEPLOY_ENVIRONMENT"
          ref="$DEPLOY_REF"
          case "$env" in
            production)
              if [ "$ref" != "main" ] && [[ "$ref" != v[0-9]* ]]; then
                echo "::error::Production may only deploy from 'main' or a version tag (v*), got '$ref'."
                exit 1
              fi
              ;;
            staging)
              if [ "$ref" != "main" ] && [[ "$ref" != release/* ]]; then
                echo "::error::Staging may only deploy from 'main' or a 'release/*' branch, got '$ref'."
                exit 1
              fi
              ;;
          esac
          echo "OK: environment='$env' ref='$ref' is an approved combination."

      - name: Check Vercel deployment credentials
        id: vercel-preflight
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail
          if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
            echo "deploy_enabled=true" >> "$GITHUB_OUTPUT"
            echo "Vercel credentials are configured."
          else
            echo "deploy_enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Vercel deployment skipped because VERCEL_TOKEN, VERCEL_ORG_ID, or VERCEL_PROJECT_ID is not configured."
          fi

  deployment-skipped:
    name: Deployment not configured
    needs: context
    if: needs.context.outputs.deploy_enabled != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Report skipped deployment
        env:
          DEPLOY_ENVIRONMENT: ${{ needs.context.outputs.environment }}
        run: |
          echo "::notice::Skipping $DEPLOY_ENVIRONMENT deployment until Vercel secrets are configured."

  deploy:
    name: Deploy to ${{ needs.context.outputs.environment }}
    needs: context
    if: needs.context.outputs.deploy_enabled == 'true'
    runs-on: ubuntu-latest
    environment:
      name: ${{ needs.context.outputs.environment }}
      url: ${{ steps.deploy.outputs.url }}
    concurrency:
      group: cd-deploy-${{ needs.context.outputs.environment }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ needs.context.outputs.ref }}

      - uses: ./.github/actions/setup-node

      - name: Deploy to Vercel
        id: deploy
        env:
          DEPLOY_ENVIRONMENT: ${{ needs.context.outputs.environment }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -o pipefail
          bash scripts/deploy/deploy.sh "$DEPLOY_ENVIRONMENT" 2>&1 | tee deploy.log

      - name: Post-deploy health check
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}
        run: bash scripts/deploy/health-check.sh "$DEPLOY_URL"

      - name: Upload deployment log
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: deploy-log-${{ needs.context.outputs.environment }}-${{ github.run_id }}
          path: deploy.log
          retention-days: 30
          if-no-files-found: warn

  rollback:
    name: Rollback ${{ needs.context.outputs.environment }}
    needs: [context, deploy]
    if: failure() && needs.context.outputs.deploy_enabled == 'true'
    runs-on: ubuntu-latest
    environment: ${{ needs.context.outputs.environment }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ needs.context.outputs.ref }}

      - name: Roll back to previous deployment
        env:
          DEPLOY_ENVIRONMENT: ${{ needs.context.outputs.environment }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -o pipefail
          bash scripts/deploy/rollback.sh "$DEPLOY_ENVIRONMENT" | tee rollback.log

      - name: Upload rollback log
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: rollback-log-${{ needs.context.outputs.environment }}-${{ github.run_id }}
          path: rollback.log
          retention-days: 30
          if-no-files-found: warn
