name: CodeQL

# Static analysis via GitHub's CodeQL, kept in its own workflow per GitHub's
# recommended setup so it can post results to the Security tab and run on
# its own schedule independent of ci.yml/security.yml.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '0 7 * * 4' # Thursday 07:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@b7351df727350dca84cb9d725d57dcf5bc82ba26

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@b7351df727350dca84cb9d725d57dcf5bc82ba26
        with:
          category: '/language:${{ matrix.language }}'
