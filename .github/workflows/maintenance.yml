name: Maintenance

# Scheduled housekeeping that isn't tied to any single PR: closing stale
# issues/PRs, and rolling up a full dependency-audit report (both npm and
# cargo, including moderate/low findings that security.yml intentionally
# doesn't block on) into a tracking issue so nothing silently ages out.
on:
  schedule:
    - cron: '0 5 * * 1' # Monday 05:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  stale:
    name: Close stale issues & PRs
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@5bef64f19d7facfb25b37b414482c7164d639639
        with:
          days-before-stale: 30
          days-before-close: 7
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: pinned,security
          exempt-pr-labels: pinned,do-not-close
          stale-issue-message: >
            This issue has had no activity for 30 days and will be closed in
            7 days if nothing changes. Comment or remove the `stale` label to
            keep it open.
          stale-pr-message: >
            This pull request has had no activity for 30 days and will be
            closed in 7 days if nothing changes. Rebase or comment to keep it
            open.

  dependency-audit-report:
    name: Full dependency audit report
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-rust

      - name: Install cargo-audit
        uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b
        with:
          tool: cargo-audit

      - name: Run yarn audit (all severities)
        id: npm_audit
        continue-on-error: true
        run: |
          echo "### yarn audit" >> "$GITHUB_STEP_SUMMARY"
          yarn audit --level low 2>&1 | tee /tmp/npm-audit.txt | head -c 60000 >> "$GITHUB_STEP_SUMMARY" || true

      - name: Run cargo audit (all severities)
        id: cargo_audit
        continue-on-error: true
        working-directory: contracts
        run: |
          echo "### cargo audit" >> "$GITHUB_STEP_SUMMARY"
          cargo audit --file Cargo.lock 2>&1 | tee /tmp/cargo-audit.txt | head -c 60000 >> "$GITHUB_STEP_SUMMARY" || true

      - name: Check lockfile & env-doc drift
        id: drift
        continue-on-error: true
        run: |
          echo "### Lockfile & environment doc drift" >> "$GITHUB_STEP_SUMMARY"
          {
            bash scripts/ci/check-lockfile.sh && yarn validate-env
          } 2>&1 | tee /tmp/drift.txt >> "$GITHUB_STEP_SUMMARY" || true

      - name: Open/update tracking issue if anything needs attention
        if: steps.npm_audit.outcome == 'failure' || steps.cargo_audit.outcome == 'failure' || steps.drift.outcome == 'failure'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          script: |
            const fs = require('fs');
            const read = (p) => (fs.existsSync(p) ? fs.readFileSync(p, 'utf8') : '(no output)');
            const body = [
              `Automated weekly dependency/maintenance report - ${new Date().toISOString().slice(0, 10)}`,
              '',
              '<details><summary>yarn audit</summary>\n\n```\n' + read('/tmp/npm-audit.txt').slice(0, 30000) + '\n```\n</details>',
              '<details><summary>cargo audit</summary>\n\n```\n' + read('/tmp/cargo-audit.txt').slice(0, 30000) + '\n```\n</details>',
              '<details><summary>lockfile / env doc drift</summary>\n\n```\n' + read('/tmp/drift.txt').slice(0, 30000) + '\n```\n</details>',
            ].join('\n');

            const title = 'Weekly maintenance report: dependency & config drift';
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'maintenance-report',
            });
            const existing = issues.find((i) => i.title === title);

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['maintenance-report'],
              });
            }
